name: Deploy Mika

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            mikaassit/mika-api:latest
            mikaassit/mika-api:${{ github.sha }}

      - name: Build Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: |
            mikaassit/mika-worker:latest
            mikaassit/mika-worker:${{ github.sha }}

      - name: Build Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://2.25.165.198:3001
          tags: |
            mikaassit/mika-web:latest
            mikaassit/mika-web:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          script: |
            cd /opt/mika

            git pull origin main

            docker compose -f docker/docker-compose.yml pull

            docker compose -f docker/docker-compose.yml up -d

            docker image prune -af