# Staging / VPS — imagens do registry (mikaassit/*) + Caddy (HTTPS)
# Uso: docker compose -f docker/docker-compose.staging.yml --env-file .env.staging up -d

services:
  caddy:
    image: caddy:2-alpine
    container_name: mika-caddy
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEB_DOMAIN: ${WEB_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    restart: unless-stopped
    networks:
      - mika

  api:
    image: ${MIKA_API_IMAGE:-mikaassit/mika-api:staging}
    container_name: mika-api
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      MIKA_TELEGRAM_MODULE_ENABLED: ${MIKA_TELEGRAM_MODULE_ENABLED:-false}
      MIKA_REMINDERS_ENABLED: ${MIKA_REMINDERS_ENABLED:-false}
      MIKA_ROUTINES_AUTOMATION_ENABLED: ${MIKA_ROUTINES_AUTOMATION_ENABLED:-false}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ROUTINE_API_KEY: ${ROUTINE_API_KEY:-}
      WEB_URL: https://${WEB_DOMAIN}
      TZ: ${TZ:-America/Sao_Paulo}
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mika

  web:
    image: ${MIKA_WEB_IMAGE:-mikaassit/mika-web:staging}
    container_name: mika-web
    environment:
      NODE_ENV: production
      PORT: 3000
      INTERNAL_API_URL: http://api:3001
    expose:
      - "3000"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mika

  worker:
    image: ${MIKA_WORKER_IMAGE:-mikaassit/mika-worker:staging}
    container_name: mika-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_MEMORY_INDEX_ENABLED: ${WORKER_MEMORY_INDEX_ENABLED:-true}
      WORKER_REMINDER_DISPATCH_ENABLED: ${WORKER_REMINDER_DISPATCH_ENABLED:-false}
      WORKER_NEGLECTED_JOBS_ENABLED: ${WORKER_NEGLECTED_JOBS_ENABLED:-false}
      WORKER_NEGLECTED_GOALS_ENABLED: ${WORKER_NEGLECTED_GOALS_ENABLED:-false}
      MEMORY_INDEX_CONCURRENCY: ${MEMORY_INDEX_CONCURRENCY:-1}
      REMINDER_DISPATCH_CONCURRENCY: ${REMINDER_DISPATCH_CONCURRENCY:-1}
      TZ: ${TZ:-America/Sao_Paulo}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mika

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mika-postgres-staging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mika

  redis:
    image: redis:7-alpine
    container_name: mika-redis-staging
    command: redis-server --save 60 1 --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mika

networks:
  mika:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
