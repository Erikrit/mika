# Mika v1.5 slim VPS stack: Web/API/Worker/Postgres/Redis only.
# Uso: docker compose -f docker/docker-compose.v1.5.yml --env-file .env.staging up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: ${DOCKER_LOG_MAX_FILE:-3}

services:
  api:
    image: ${MIKA_API_IMAGE:-mikaassit/mika-api:staging}
    container_name: mika-api
    environment:
      NODE_ENV: production
      API_PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      MIKA_TELEGRAM_MODULE_ENABLED: ${MIKA_TELEGRAM_MODULE_ENABLED:-false}
      MIKA_REMINDERS_ENABLED: ${MIKA_REMINDERS_ENABLED:-false}
      MIKA_ROUTINES_AUTOMATION_ENABLED: ${MIKA_ROUTINES_AUTOMATION_ENABLED:-false}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ROUTINE_API_KEY: ${ROUTINE_API_KEY:-}
      WEB_URL: ${PUBLIC_WEB_URL}
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      TZ: ${TZ:-America/Sao_Paulo}
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: ${API_MEM_LIMIT:-768m}
    cpus: ${API_CPU_LIMIT:-1.0}
    logging: *default-logging
    networks:
      - mika

  web:
    image: ${MIKA_WEB_IMAGE:-mikaassit/mika-web:staging}
    container_name: mika-web
    environment:
      NODE_ENV: production
      PORT: 3000
      INTERNAL_API_URL: http://api:3001
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped
    mem_limit: ${WEB_MEM_LIMIT:-512m}
    cpus: ${WEB_CPU_LIMIT:-1.0}
    logging: *default-logging
    networks:
      - mika

  worker:
    image: ${MIKA_WORKER_IMAGE:-mikaassit/mika-worker:staging}
    container_name: mika-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      WORKER_MEMORY_INDEX_ENABLED: ${WORKER_MEMORY_INDEX_ENABLED:-true}
      WORKER_REMINDER_DISPATCH_ENABLED: ${WORKER_REMINDER_DISPATCH_ENABLED:-false}
      WORKER_NEGLECTED_JOBS_ENABLED: ${WORKER_NEGLECTED_JOBS_ENABLED:-false}
      WORKER_NEGLECTED_GOALS_ENABLED: ${WORKER_NEGLECTED_GOALS_ENABLED:-false}
      MEMORY_INDEX_CONCURRENCY: ${MEMORY_INDEX_CONCURRENCY:-1}
      REMINDER_DISPATCH_CONCURRENCY: ${REMINDER_DISPATCH_CONCURRENCY:-1}
      LOG_LEVEL: ${LOG_LEVEL:-warn}
      TZ: ${TZ:-America/Sao_Paulo}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: ${WORKER_MEM_LIMIT:-512m}
    cpus: ${WORKER_CPU_LIMIT:-1.0}
    logging: *default-logging
    networks:
      - mika

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mika-postgres-v15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: ${POSTGRES_MEM_LIMIT:-1g}
    cpus: ${POSTGRES_CPU_LIMIT:-1.0}
    logging: *default-logging
    networks:
      - mika

  redis:
    image: redis:7-alpine
    container_name: mika-redis-v15
    command: redis-server --save 60 1 --requirepass ${REDIS_PASSWORD} --maxmemory ${REDIS_MAXMEMORY:-128mb} --maxmemory-policy noeviction
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: ${REDIS_MEM_LIMIT:-192m}
    cpus: ${REDIS_CPU_LIMIT:-0.5}
    logging: *default-logging
    networks:
      - mika

networks:
  mika:
    driver: bridge

volumes:
  pgdata:
  redisdata:
